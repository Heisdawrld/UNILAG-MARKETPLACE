services:
  - type: web
    name: unilag-marketplace
    runtime: node
    rootDir: .
    repo: https://github.com/Heisdawrld/UNILAG-MARKETPLACE
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      # ── Database (REQUIRED — set TURSO_DATABASE_URL and TURSO_AUTH_TOKEN in Render Dashboard) ──
      # DATABASE_URL MUST be set to the same value as TURSO_DATABASE_URL for the Prisma adapter
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      # ── Clerk Auth (Optional — app works without it in demo mode) ──
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      # ── Flutterwave Payments (Optional — needed for payments) ──
      - key: NEXT_PUBLIC_FLUTTERWAVE_PUBLIC_KEY
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_WEBHOOK_HASH
        sync: false
      # ── App Config ──
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      # ── Seed Secret (protects /api/seed in production) ──
      - key: SEED_SECRET_KEY
        sync: false
