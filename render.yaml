services:
  - type: web
    name: unilag-marketplace
    runtime: node
    rootDir: .
    repo: https://github.com/Heisdawrld/UNILAG-MARKETPLACE
    branch: main
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # ── Database (REQUIRED) ──
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      # ── Clerk Auth (REQUIRED) ──
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      # ── Admin Configuration ──
      - key: ADMIN_EMAILS
        sync: false
      - key: ADMIN_USERNAMES
        sync: false
      # ── Flutterwave Payments ──
      # MODES: 'locked' (disabled), 'sandbox' (test), 'live' (real money)
      # Keep 'locked' until you have the official UNILAG Marketplace account
      - key: FLUTTERWAVE_MODE
        value: locked
      - key: NEXT_PUBLIC_FLUTTERWAVE_PUBLIC_KEY
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_WEBHOOK_HASH
        sync: false
      # ── Upstash Redis (for real-time features + rate limiting) ──
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      # ── Socket.io Auth ──
      - key: SOCKET_TOKEN_SECRET
        generateValue: true
      # ── Uploadthing (Cloud Image Storage) ──
      # If not set, images fall back to base64 compression (works but less efficient)
      - key: UPLOADTHING_TOKEN
        sync: false
      # ── Push Notifications ──
      - key: NEXT_PUBLIC_VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      # ── App Config ──
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: SEED_SECRET_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true

# ── Cron Jobs ──
# Render does not support cron jobs on free plans. Use an external cron
# service (e.g. cron-job.org, EasyCron, or GitHub Actions) to call the
# delivery-timeouts endpoint every 5 minutes:
#
#   GET https://<your-app>.onrender.com/api/cron/delivery-timeouts
#   Header: Authorization: Bearer <CRON_SECRET>
#   — or —
#   Header: x-cron-secret: <CRON_SECRET>
#
# This endpoint handles:
#   1. Auto-cancel stale searching orders (>5 min, no offers)
#   2. Auto-cancel runner no-shows (>15 min without pickup)
#   3. Flag stuck deliveries for admin review (>60 min in transit)
#   4. Auto-cancel unpaid orders after runner assignment (>5 min)
